<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poetfolio | Bhai Log</title>
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="dark">

  <!-- Preloader -->
  <div id="preloader">
    <div class="preloader-orb"></div>
    <div class="preloader-text">Poetfolio</div>
    <div class="preloader-sub">Ahmad Ajmal</div>
    <div class="preloader-bar"><div class="preloader-fill"></div></div>
  </div>

  <!-- Navigation -->
  <nav class="nav-bar">
    <div class="nav-left">
      <button class="btn-diamond" id="adminBtn" title="Admin Access">◆</button>
    </div>
    <div class="nav-center">
      <a href="index.html" class="nav-link">Home</a>
      <a href="work.html" class="nav-link">Work</a>
      <a href="play.html" class="nav-link">Play</a>
      <a href="contact.html" class="nav-link">Contact</a>
    </div>
    <div class="nav-right">
      <button class="btn-theme-toggle" id="themeToggle" title="Toggle Theme">
        <span class="theme-icon">☀️</span>
      </button>
    </div>
  </nav>

  <!-- Password Modal -->
  <div class="modal-overlay" id="passwordModal">
    <div class="modal-box">
      <h3 class="modal-title">Admin Access</h3>
      <form id="passwordForm">
        <input type="password" id="adminPassword" class="form-input" placeholder="Enter Password" required>
        <div class="password-error" id="passwordError"></div>
        <button type="submit" class="btn-primary">Enter Dashboard</button>
      </form>
      <button class="btn-icon" id="closeModal" style="position: absolute; top: 1rem; right: 1rem;">✕</button>
    </div>
  </div>

  <div class="page-wrapper">
    <section class="play-hero">
      <h1 class="section-title reveal">Bhai Log</h1>
      <p class="section-subtitle reveal" style="margin: 0 auto;">The golden squad members.</p>
      <div style="text-align: center; margin-top: 1.5rem;">
        <button class="btn-play" id="becomeBhaiBtn">Become Bhai? <span>→</span></button>
      </div>
    </section>

    <div class="main-content">
      <!-- Quiz Section (hidden initially) -->
      <div id="quizSection" style="display:none; max-width: 500px; margin: 0 auto; padding: 2rem 0;"></div>

      <!-- Members Grid -->
      <div class="bhai-page-grid" id="bhaiPageGrid">
        <div class="empty-state" id="bhaiPageEmpty" style="display: none;">
          <div class="empty-icon">👥</div>
          <div class="empty-text">No members yet. Be the first!</div>
        </div>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <p>&copy; <span id="currentYear"></span>. Built with <span class="footer-accent">Noir Editorial</span> design.</p>
  </footer>

  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
  <script src="js/common.js"></script>
  <script src="js/bhai.js"></script>
</body>
</html>
